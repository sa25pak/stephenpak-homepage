<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tech Company</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 50px 0;
        }
        h1 {
            font-size: 48px;
            color: #5c8dfd;
        }
        .hero {
            background-color: rgba(92, 141, 253, 0.2);
            border-radius: 10px;
            padding: 60px 30px;
            margin: 20px 0;
        }
        .hero h2 {
            font-size: 36px;
        }
        .contact {
            margin-top: 40px;
        }
        .contact a {
            color: #5c8dfd;
            text-decoration: none;
            border: 2px solid #5c8dfd;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        .contact a:hover {
            background-color: #5c8dfd;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Welcome to Our Tech Company</h1>
        </header>
        <div class="hero">
            <h2>Your Technology, Our Future</h2>
            <p>Innovating for a better tomorrow with cutting-edge solutions.</p>
        </div>
        <div class="contact">
            <a href="mailto:contact@techcompany.com">Contact Us</a>
        </div>
    </div>
</body>
</html>
